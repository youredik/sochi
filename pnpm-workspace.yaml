packages:
  - 'apps/*'
  - 'packages/*'

# Supply-chain hardening (pnpm 10.16+ canon — settings живут здесь, не в .npmrc).
# Защита против zero-day npm attacks (Axios март 2026, node-ipc 14 мая 2026,
# Shai-Hulud campaign). Research 2026-05-20 — pnpm 11 ships эти defaults,
# на 10.x нужно явное opt-in.

# 24-часовой cooldown между npm publish и установкой — block-window для атак
# через compromised maintainer account → publish → vendor разработчик install.
minimumReleaseAge: 1440

# Security-fix exclusions — packages где cooldown impedes critical CVE fix.
# 2026-05-27: tmp@0.2.6 (GHSA-ph9p-34f9-6g65 high severity path traversal,
# fix needed для прохождения ratchet audit gate). Re-evaluate after 24h
# release age достигнут.
#
# 2026-05-30: better-auth + @better-auth/* 1.6.12 (released 2026-05-30 00:31
# UTC) — security fix applicable к нам (cookie-replay → 2FA-bypass #9639 при
# enabled cookieCache; atomic passkey anti-replay #9622; cookie-parse-behind-
# proxy #9543, мы за YC Gateway). Excluded per user directive — apply NOW, не
# ждать 24h cooldown. Glob `@better-auth/*` покрывает family (passkey +
# transitive drizzle-adapter etc, released в один timestamp). REMOVE after
# 2026-05-31 00:31 UTC (natural maturity достигнута) — keep exclude-list lean.
minimumReleaseAgeExclude:
  - tmp
  - better-auth
  - '@better-auth/*'

# Запретить exotic subdeps (git:/tarball: URL в transitive deps) — vector для
# typosquat-attacks через compromised package.json subdeps.
blockExoticSubdeps: true

# Phase out unrestricted postinstall execution. `onlyBuiltDependencies`
# (array form) — canonical key для pnpm 10.x. Object form `allowBuilds: {...}`
# в pnpm 10.33.4 НЕ работает корректно с `strictDepBuilds: true` (run #13
# regression: install fails «ERR_PNPM_IGNORED_BUILDS msw, protobufjs» даже
# когда они в allowBuilds). Array form проверена `pnpm config get
# only-built-dependencies`.
onlyBuiltDependencies:
  - '@ydbjs/core'
  - '@biomejs/biome'
  - '@typescript/native-preview'
  - bun
  - esbuild
  - lefthook
  - msw
  - protobufjs
  - sharp
