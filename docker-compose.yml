services:
  # Yandex Database — локальный single-node вариант для разработки.
  # КРИТИЧНО: internal == external ports, потому что YDB Driver discovery
  # возвращает host:internal_port как endpoint. Если порты разные (напр. 2236:2136),
  # то с `hostname: localhost` клиент получит `localhost:2136` и попадёт в ЧУЖОЙ
  # YDB-контейнер другого проекта, висящий на host-порту 2136 (проверено и
  # задокументировано 2026-04-23 — см. project_ydb_specifics.md).
  # Сдвиг +100 от дефолтов — чтобы не конфликтовать с другими локальными YDB.
  # YDB_USE_IN_MEMORY_PDISKS=true — данные в RAM, мгновенный старт, не для prod.
  ydb:
    image: ydbplatform/local-ydb:25.3.1.25
    hostname: localhost
    platform: linux/amd64
    # `unless-stopped` — auto-revival after silent crashes. local-ydb under
    # parallel test load occasionally dies on slow-query timeouts (memory
    # `feedback_test_serial_for_pre_push.md`) — observed 2026-04-27 when the
    # init script's `wait pid 18` exited with code 127 after a 7.88s tx.
    # Without this policy, pre-push gate sees ECONNREFUSED instead of
    # waiting for restart, fails opaquely, and operator wastes time
    # diagnosing what looks like test regressions.
    restart: unless-stopped
    ports:
      - '2235:2235'
      - '2236:2236'
      - '8865:8865'
    environment:
      - GRPC_TLS_PORT=2235
      - GRPC_PORT=2236
      - MON_PORT=8865
      - YDB_USE_IN_MEMORY_PDISKS=true
      - YDB_DEFAULT_LOG_LEVEL=NOTICE
      # M9-debug 2026-04-28: YDB_GRPC_ENABLE_TLS=false disables TLS-port
      # (default true triggers init script cert generation, which fails on
      # fresh container с named-volume /ydb_certs). Empirical verified via
      # `docker run --entrypoint cat .../initialize_local_ydb` —
      # `YDB_GRPC_ENABLE_TLS=${YDB_GRPC_ENABLE_TLS:-true}` toggle. Dev-only
      # gate: prod uses TLS via deploy-phase TF (deferred per
      # `project_deferred_deploy_plan.md`).
      - YDB_GRPC_ENABLE_TLS=false
    healthcheck:
      test: ['CMD-SHELL', '/ydb -e grpc://localhost:2236 -d /local --no-discovery sql -s "SELECT 1"']
      interval: 10s
      start_period: 20s
      timeout: 5s
      retries: 5
    volumes:
      - ./schema:/schema:ro
      - ydb_data:/ydb_data
      # ydb_certs (M9-debug 2026-04-28): YDB init script generates self-signed
      # cert в /ydb_certs/cert.pem на FIRST start (для GRPC_TLS_PORT=2235).
      # Без persistent volume — `docker compose down ydb` теряет cert; fresh
      # `up` падает: «Can't find /ydb_certs/cert.pem». Per canonical YDB docs
      # (ydb.tech/docs/en/reference/docker/start) — ydb_certs ОБЯЗАТЕЛЬНО
      # persistent. Empirical fix verified 2026-04-28 после web-research pass.
      - ydb_certs:/ydb_certs

  # MinIO — S3-совместимое хранилище (локальная замена Yandex Object Storage).
  # Host-порты: 9100 S3 API, 9101 web UI (http://localhost:9101, minioadmin/minioadmin).
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - '9100:9000'
      - '9101:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      start_period: 5s
      timeout: 3s
      retries: 5
    volumes:
      - minio_data:/data

  # Mailpit — локальный SMTP перехватчик (замена Yandex Postbox в dev).
  # Host-порты: 1125 SMTP, 8125 web UI (http://localhost:8125 — смотреть отправленные письма).
  mailpit:
    image: axllent/mailpit:v1.29.7
    ports:
      - '1125:1025'
      - '8125:8025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:8025/api/v1/info || exit 1']
      interval: 10s
      start_period: 3s
      timeout: 3s
      retries: 3

  # MinIO bucket bootstrap — одноразовый контейнер, создаёт бакет 'horeca-files' после старта MinIO.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/horeca-files &&
      mc anonymous set none local/horeca-files &&
      echo 'MinIO bucket ready: horeca-files'
      "
    restart: 'no'

volumes:
  ydb_data:
  ydb_certs:
  minio_data:
