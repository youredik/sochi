# =============================================================================
# Sochi HoReCa — SourceCraft CI/CD (Q2 2026 canon, 2026-05-21)
# =============================================================================
#
# Empirical canon refresh 2026-05-21 — full stankoff parity after 30 runs.
# Structural pattern stankoff-v2 aligned (multi-cube-per-task с `needs:`,
# не отдельные tasks).
#
# Image versions (verified empirically 2026-05-21):
#   node:24-slim         — Node 24 LTS (active until April 2028) — quality cubes
#   docker:29-cli        — Engine 29 + Buildx 0.25 (build-push)
#   amazon/aws-cli:2.34.50 — pinned (NOT :latest — anti-pattern per AWS)
#   hashicorp/terraform:1.10 — stankoff canon 2 years stable (NOT OpenTofu —
#                              run #28 empirical: terraform-mirror.yandexcloud.net
#                              serves registry.terraform.io/yandex-cloud/yandex
#                              v0.204, opentofu.org namespace empty for yandex)
#   gcr.io/go-containerregistry/crane:debug — mirror MCR→cr.yandex (Google canon)
#   pnpm@10.33.4 via corepack (latest 10.x patch)
#   bun 1.3.14 — npm install -g (test-fast cube, sochi-specific)
#   cr.yandex/sepshn/playwright:v1.60.0-noble — MCR mirror (anon pull, run #30)
#   YC sourcecraft images :latest — internal Yandex registry, trusted
#
# Service Connection `deploy-connection` (OIDC) — created в SourceCraft UI
# 2026-05-20, scope: repo, bound к Сэпшн org / sepshn cloud b1gisf466novulsg0a0n.
# =============================================================================

env:
  REGISTRY: 'cr.yandex/crp4um8fg84qoro1voi6'
  IMAGE_NAME: 'backend'
  # Phase 2 Postbox redeploy trigger 2026-05-22 — force image rebuild so
  # cf7cf75 backend dual-write code reaches runtime (latest deployed image
  # `:76be5aa` predates Phase 2 refactor; intermediate pushes были infra-only
  # → deploy workflow path-filter не matched). Touch this env line на rotate.

tokens:
  yc:
    service_connection: deploy-connection
    scope: repo

on:
  push:
    # Quality всегда (исключаем только docs/markdown — они не влияют на code).
    - workflows: [quality]
      filter:
        branches: ['main']
        paths: ['**', '!docs/**', '!**/*.md', '!.claude/**', '!CHANGELOG.md']
    # Deploy ТОЛЬКО если есть code changes в backend/frontend/widget/shared/infra.
    # Skip на docs-only / scripts-only / lefthook config / sourcecraft yaml-only.
    # Empirical: deploy chain = 273s. Skip-fast pattern canon 2026 (dorny/paths-filter).
    - workflows: [deploy]
      filter:
        branches: ['main']
        paths:
          - 'apps/**'
          - 'packages/**'
          - 'pnpm-lock.yaml'
          - 'pnpm-workspace.yaml'
          - 'package.json'
          - '.sourcecraft/ci.yaml'
    - workflows: [infra-apply]
      filter:
        branches: ['main']
        paths: ['infra/**']
    # Mirror внешних base images в cr.yandex (intra-DC fast pull в CI).
    # Trigger ТОЛЬКО на lockfile change (playwright bump → pnpm-lock.yaml updates).
    # SC limit: 3 workflows per push event. ci.yaml исключён чтобы не вытеснять
    # deploy/infra-apply workflows когда меняется только pipeline config.
    # Idempotent — crane copy skips если src/dst digests match.
    - workflows: [mirror-images]
      filter:
        branches: ['main']
        paths:
          - 'pnpm-lock.yaml'

  pull_request:
    - workflows: [quality]
    - workflows: [infra-plan]
      filter:
        paths: ['infra/**']

workflows:
  quality:
    settings:
      max_cube_duration: 15m
    tasks:
      - quality

  infra-plan:
    settings:
      max_cube_duration: 10m
    tasks:
      - tofu-plan

  infra-apply:
    settings:
      max_cube_duration: 20m
    tasks:
      - tofu-apply

  # Mirror внешних base images в cr.yandex — fast intra-DC pull в main CI.
  # Idempotent (crane copy skips если digests match) → ОК на каждый push.
  mirror-images:
    settings:
      max_cube_duration: 10m
    tasks:
      - mirror-playwright

  deploy:
    settings:
      max_cube_duration: 30m
    tasks:
      - deploy-backend
      - deploy-frontend
      - deploy-verify

# =============================================================================
# Task definitions — stankoff canon: multi-cube-per-task с `needs:` dependencies
# =============================================================================

tasks:
  # ---------------------------------------------------------------------------
  # QUALITY — `install` once, dependent cubes используют SHARED WORKSPACE.
  #
  # Canon 2026-05-20 (Yandex SC docs):
  #   «If a Docker cube changes the environment, such environment will be
  #    available to other cubes within the task only in case the changes were
  #    made within the /sourcecraft directory.»
  #   → `/sourcecraft/workspace` persists между cubes одной task. node_modules
  #     заполненный install cube'ом ВИДЕН всем cubes с `needs: [install]`.
  #   → DROP redundant `pnpm install` из dependent cubes (saves 60s × 4 = 240s
  #     cube-seconds; wall-time ~−60s в parallel-DAG).
  # ---------------------------------------------------------------------------
  - name: quality
    cubes:
      - name: install
        image: node:24-slim
        script:
          - corepack enable && corepack prepare pnpm@10.33.4 --activate
          - pnpm install --frozen-lockfile

      - name: typecheck
        needs: [install]
        image: node:24-slim
        script:
          - corepack enable && corepack prepare pnpm@10.33.4 --activate
          - pnpm typecheck

      - name: lint
        needs: [install]
        image: node:24-slim
        script:
          - corepack enable && corepack prepare pnpm@10.33.4 --activate
          - pnpm lint
          - pnpm format:check

      # test-fast — bun:test для 3 из 4 sub-tests. node:24-slim не имеет bun;
      # ставим через npm install -g bun → /usr/local/bin/bun (system PATH).
      - name: test-fast
        needs: [install]
        image: node:24-slim
        script:
          - set -e
          - corepack enable && corepack prepare pnpm@10.33.4 --activate
          - npm install -g bun@1.3.14
          - bun --version
          - pnpm test:fast

      # Supply-chain audit — 2026-05-20 canon:
      #   1) pnpm audit (npm advisory DB)
      #   2) OSV-Scanner V2 (Google, broader DB чем npm-only)
      # allow_failure: true — НЕ блокирует sibling cubes (typecheck/test-fast)
      # при обнаружении уязвимостей. Empirically: SC fail-fast прерывал task,
      # test-fast/typecheck не запускались на run #15. Audit failure = warning,
      # не блокирует deploy (audit fix отдельным PR).
      - name: supply-chain-audit
        needs: [install]
        allow_failure: true
        image: node:24-slim
        script:
          - set -e
          - corepack enable && corepack prepare pnpm@10.33.4 --activate
          - 'pnpm audit --audit-level=high --json > /tmp/audit.json || { echo "FAIL: pnpm audit high/critical vulnerabilities"; cat /tmp/audit.json; exit 1; }'
          - apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null
          - curl -fsSL -o /usr/local/bin/osv-scanner
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          - chmod +x /usr/local/bin/osv-scanner
          - osv-scanner --lockfile=pnpm-lock.yaml --format=table

  # ---------------------------------------------------------------------------
  # INFRA — tofu plan/apply (auth via get-iam-token cube → IAM_TOKEN)
  # ---------------------------------------------------------------------------
  - name: tofu-plan
    cubes:
      - name: get-iam-token
        env:
          ID_TOKEN: ${{ tokens.yc.id_token }}
          YC_SA_ID: ${{ tokens.yc.service_account_id }}
        image: cr.yandex/sourcecraft/yc-iam:latest
      - name: plan
        needs: [get-iam-token]
        image:
          name: hashicorp/terraform:1.10
          entrypoint: ''
        env:
          YC_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_BOT_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_BOT_S3_SECRET_ACCESS_KEY }}
          TF_CLI_CONFIG_FILE: /tmp/.terraformrc
        script:
          - apk add --no-cache git bash
          # registry.terraform.io blocked from RU IPs (Hashicorp geoblock).
          # Yandex mirror serves canonical TF provider protocol.
          # Stankoff canon 2026-04-25 verified empirically — 2 years stable.
          - |
            cat > /tmp/.terraformrc <<'EOF'
            provider_installation {
              network_mirror {
                url = "https://terraform-mirror.yandexcloud.net/"
              }
              direct {
                exclude = ["registry.terraform.io/*/*"]
              }
            }
            EOF
          - cd infra
          - terraform init -input=false
          - terraform plan -no-color -input=false | tee plan.txt

  - name: tofu-apply
    cubes:
      - name: get-iam-token
        env:
          ID_TOKEN: ${{ tokens.yc.id_token }}
          YC_SA_ID: ${{ tokens.yc.service_account_id }}
        image: cr.yandex/sourcecraft/yc-iam:latest
      - name: apply
        needs: [get-iam-token]
        image:
          name: hashicorp/terraform:1.10
          entrypoint: ''
        env:
          YC_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_BOT_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_BOT_S3_SECRET_ACCESS_KEY }}
          TF_CLI_CONFIG_FILE: /tmp/.terraformrc
        script:
          - apk add --no-cache git bash
          # Same mirror config как plan — stankoff canon 2026-04-25
          - |
            cat > /tmp/.terraformrc <<'EOF'
            provider_installation {
              network_mirror {
                url = "https://terraform-mirror.yandexcloud.net/"
              }
              direct {
                exclude = ["registry.terraform.io/*/*"]
              }
            }
            EOF
          - cd infra
          # State migration — run #28 empirical: OpenTofu runs left state с
          # registry.opentofu.org/* provider refs. Terraform CLI validates ALL
          # state providers против registries → 403 RU geoblock на opentofu.org.
          # Canon: `state replace-provider` migration commands (one-time, idempotent
          # с `|| true` fallback на repeat runs).
          # Source: developer.hashicorp.com/terraform/cli/commands/state/replace-provider
          - terraform init -input=false -backend=true -get=false || true
          - |
            for prov in hashicorp/random hashicorp/aws hashicorp/time yandex-cloud/yandex; do
              terraform state replace-provider -auto-approve \
                "registry.opentofu.org/$prov" "registry.terraform.io/$prov" 2>/dev/null || true
            done
          - terraform init -input=false
          - terraform apply -auto-approve -input=false -parallelism=1

  # ---------------------------------------------------------------------------
  # MIRROR PLAYWRIGHT — crane copy MCR → cr.yandex (intra-DC fast pull).
  # Canon 2026 (Google go-containerregistry / Depot mainstream):
  #   crane copy registry-to-registry, NO local layer storage
  #   Idempotent — skips если src digest == dst digest
  # Empirical run #20: prepare-image-for-playwright-smoke = 203s (MCR
  # cross-border variable). Expected after mirror: 30-50s (cr.yandex intra-DC).
  # ---------------------------------------------------------------------------
  - name: mirror-playwright
    cubes:
      - name: get-iam-token
        env:
          ID_TOKEN: ${{ tokens.yc.id_token }}
          YC_SA_ID: ${{ tokens.yc.service_account_id }}
        image: cr.yandex/sourcecraft/yc-iam:latest

      - name: mirror
        needs: [get-iam-token]
        image:
          name: gcr.io/go-containerregistry/crane:debug
          entrypoint: ''
        env:
          YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
          PW_VERSION: 'v1.60.0-noble'
          DST_REGISTRY: 'cr.yandex/crp4um8fg84qoro1voi6'
        script:
          - set -e
          - 'SRC=mcr.microsoft.com/playwright:${PW_VERSION}'
          - 'DST=${DST_REGISTRY}/playwright:${PW_VERSION}'
          # Auth to cr.yandex (crane reads ~/.docker/config.json)
          - mkdir -p ~/.docker
          - 'AUTH=$(printf "iam:%s" "$YC_IAM_TOKEN" | base64 -w 0)'
          - 'echo "{\"auths\":{\"cr.yandex\":{\"auth\":\"${AUTH}\"}}}" > ~/.docker/config.json'
          # Idempotent — skip если digests match
          - 'SRC_DIGEST=$(/ko-app/crane digest "$SRC" 2>/dev/null || echo "NONE")'
          - 'DST_DIGEST=$(/ko-app/crane digest "$DST" 2>/dev/null || echo "MISSING")'
          - 'echo "src=$SRC_DIGEST dst=$DST_DIGEST"'
          - 'if [ "$SRC_DIGEST" = "$DST_DIGEST" ] && [ "$DST_DIGEST" != "MISSING" ]; then echo "mirror up-to-date, skip"; else echo "mirroring $SRC -> $DST"; /ko-app/crane copy --platform linux/amd64 "$SRC" "$DST"; fi'

  # ---------------------------------------------------------------------------
  # DEPLOY BACKEND — get-iam-token → build-push → revision-deploy
  # ---------------------------------------------------------------------------
  - name: deploy-backend
    cubes:
      - name: get-iam-token
        env:
          ID_TOKEN: ${{ tokens.yc.id_token }}
          YC_SA_ID: ${{ tokens.yc.service_account_id }}
        image: cr.yandex/sourcecraft/yc-iam:latest

      - name: build-push
        needs: [get-iam-token]
        image: docker:29-cli
        env:
          YC_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
        script:
          - SHA=$(git rev-parse --short HEAD)
          - echo "${YC_TOKEN}" | docker login --username iam --password-stdin cr.yandex
          # Canon 2026-05: registry cache export requires `docker-container`
          # buildx driver (default `docker` driver не поддерживает). Empirical
          # run #26: «Cache export is not supported for the docker driver».
          # Source: docs.docker.com/build/builders/drivers/docker-container/
          - docker buildx create --name builder --driver docker-container --use --bootstrap
          # Conditional cache mode — canon 2026-05 (freecodecamp + Depot):
          #   mode=max ТОЛЬКО когда lockfile/Dockerfile изменились (cache export 53s).
          #   mode=min на остальных commits (cache export ~5s).
          - 'if git diff --name-only HEAD~1 HEAD -- apps/backend/Dockerfile pnpm-lock.yaml pnpm-workspace.yaml package.json 2>/dev/null | grep -q .; then CACHE_MODE=max; echo "lockfile/Dockerfile changed → mode=max"; else CACHE_MODE=min; echo "no lockfile change → mode=min"; fi'
          # YC cr.yandex принимает zstd cache layers (verified run #17).
          # Image layers — gzip default (YC Serverless REJECTS zstd image, run #17).
          # OCI annotations — supply-chain hygiene (docs.docker.com/build/metadata/annotations).
          - docker buildx build --platform linux/amd64 --provenance=false
            --cache-from type=registry,ref=${REGISTRY}/${IMAGE_NAME}:buildcache
            --cache-to type=registry,ref=${REGISTRY}/${IMAGE_NAME}:buildcache,mode=$CACHE_MODE,compression=zstd,oci-mediatypes=true,image-manifest=true
            --annotation "org.opencontainers.image.revision=${SHA}"
            --annotation "org.opencontainers.image.source=https://sourcecraft.dev/sepshn/sepshn"
            --annotation "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            -f apps/backend/Dockerfile
            -t ${REGISTRY}/${IMAGE_NAME}:${SHA}
            -t ${REGISTRY}/${IMAGE_NAME}:latest
            --push .

      - name: revision-deploy
        needs: [build-push]
        image:
          name: cr.yandex/sourcecraft/yc-cli:latest
          entrypoint: ''
        env:
          # Belt-and-suspenders: оба env-имени установлены identical value.
          # YC_TOKEN — official yc CLI env (документировано Yandex).
          # YC_IAM_TOKEN — convention в yc-cli:latest image (stankoff canon).
          # Run #7+#8+#9 показали failed credentials даже с одним из них —
          # explicit --token флаг в script тоже добавлен (см. ниже).
          YC_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
          YC_IAM_TOKEN: ${{ cubes.get-iam-token.outputs.IAM_TOKEN }}
          YC_CONTAINER_NAME: ${{ secrets.YC_CONTAINER_NAME }}
          # Container живёт в demo-folder, не в infra-folder.
          # tokens.yc.folder_id указывает на SC connection default (infra).
          # Run #11 показал «container with name "***" not found» — секрет
          # YC_DEMO_FOLDER_ID точно содержит правильный demo-folder ID.
          YC_FOLDER_ID: ${{ secrets.YC_DEMO_FOLDER_ID }}
          YC_RUNTIME_SA_ID: ${{ secrets.YC_RUNTIME_SA_ID }}
          YC_LOCKBOX_ID: ${{ secrets.YC_LOCKBOX_SECRET_ID }}
          YC_LOCKBOX_VERSION_ID: ${{ secrets.YC_LOCKBOX_VERSION_ID }}
          YDB_CONNECTION_STRING: ${{ secrets.YDB_CONNECTION_STRING }}
          S3_BUCKET: ${{ secrets.S3_BACKEND_FILES_BUCKET }}
        script:
          - set -e
          # Diagnostic: убедимся что IAM token есть и непустой
          - 'echo "YC_TOKEN length=${#YC_TOKEN}"'
          - 'test -n "$YC_TOKEN" || { echo "FAIL: IAM_TOKEN empty"; exit 1; }'
          - SHA=$(git rev-parse --short HEAD)
          # Auto-fetch latest Lockbox version_id — eliminates manual SC secret
          # sync после каждого TF apply (canon 2026-05-22). TF version_hashed
          # bundles rotate when contents change (Postbox keys + SmartCaptcha
          # additions); CI all'ways uses current head.
          # `--id` flag обязателен — positional arg ambiguous if a different
          # secret has matching name (run #50 empirical: "two 'secret' objects
          # has been found"). yc-cli:latest does not include jq; используем
          # yaml output + awk.
          - YC_LOCKBOX_VERSION_ID=$(yc --token "$YC_TOKEN" lockbox secret get --id "$YC_LOCKBOX_ID" --format yaml | awk '/^current_version:/{flag=1;next} flag && /^  id:/{print $2; exit}')
          - 'test -n "$YC_LOCKBOX_VERSION_ID" || { echo "FAIL: could not fetch Lockbox version_id"; exit 1; }'
          - 'echo "Using Lockbox version_id=$YC_LOCKBOX_VERSION_ID"'
          # --token флаг takes precedence over env/profile — bulletproof auth
          - yc --token "$YC_TOKEN" serverless container revision deploy
            --container-name "$YC_CONTAINER_NAME"
            --folder-id "$YC_FOLDER_ID"
            --image "${REGISTRY}/${IMAGE_NAME}:${SHA}"
            --service-account-id "$YC_RUNTIME_SA_ID"
            --memory 1GB --cores 1 --core-fraction 100
            --concurrency 4 --execution-timeout 30s --min-instances 1
            --environment APP_MODE=sandbox
            --environment NODE_ENV=production
            --environment LOG_LEVEL=info
            --environment DEMO_DEPLOYMENT=true
            --environment HOST=demo.sepshn.ru
            --environment PUBLIC_BASE_URL=https://demo.sepshn.ru
            --environment BETTER_AUTH_URL=https://demo.sepshn.ru
            --environment BETTER_AUTH_TRUSTED_ORIGINS=https://demo.sepshn.ru
            --environment YDB_CONNECTION_STRING="$YDB_CONNECTION_STRING"
            --environment YDB_METADATA_CREDENTIALS=1
            --environment PAYMENT_PROVIDER=stub
            --environment VISION_PROVIDER=mock
            --environment POSTBOX_ENABLED=true
            --environment POSTBOX_ENDPOINT=https://postbox.cloud.yandex.net
            --environment EMAIL_FROM_ADDRESS=noreply@sepshn.ru
            --environment EMAIL_FROM_NAME="Сэпшн"
            --environment EMAIL_REPLY_TO_ADDRESS=hi@sepshn.ru
            --environment APP_MODE_PERMITTED_MOCK_ADAPTERS="email.demo-inbox,sms.demo-inbox,payment.stub,vision.mock"
            --environment S3_ENDPOINT=https://storage.yandexcloud.net
            --environment S3_REGION=ru-central1
            --environment S3_BUCKET="$S3_BUCKET"
            --secret id=$YC_LOCKBOX_ID,version-id=$YC_LOCKBOX_VERSION_ID,key=BETTER_AUTH_SECRET,environment-variable=BETTER_AUTH_SECRET
            --secret id=$YC_LOCKBOX_ID,version-id=$YC_LOCKBOX_VERSION_ID,key=S3_ACCESS_KEY_ID,environment-variable=S3_ACCESS_KEY_ID
            --secret id=$YC_LOCKBOX_ID,version-id=$YC_LOCKBOX_VERSION_ID,key=S3_SECRET_ACCESS_KEY,environment-variable=S3_SECRET_ACCESS_KEY
            --secret id=$YC_LOCKBOX_ID,version-id=$YC_LOCKBOX_VERSION_ID,key=POSTBOX_ACCESS_KEY_ID,environment-variable=POSTBOX_ACCESS_KEY_ID
            --secret id=$YC_LOCKBOX_ID,version-id=$YC_LOCKBOX_VERSION_ID,key=POSTBOX_SECRET_ACCESS_KEY,environment-variable=POSTBOX_SECRET_ACCESS_KEY
            --secret id=e6qa4in4mep35ubimi6c,version-id=e6qvbn4ajnl1fcff7h9q,key=SMARTCAPTCHA_SERVER_KEY,environment-variable=SMARTCAPTCHA_SERVER_KEY
            --secret id=e6q3ug4k0m9eobgstvv2,version-id=e6q96288msve5pnu3rvo,key=DADATA_API_KEY,environment-variable=DADATA_API_KEY

  # ---------------------------------------------------------------------------
  # DEPLOY FRONTEND — build (node:24-slim) + upload (aws-cli pinned)
  # ---------------------------------------------------------------------------
  - name: deploy-frontend
    cubes:
      # Single-dependent task — install cube НЕ окупается (empirical run #15/#16:
      # install 76s overhead > savings 66s в build). Combined install+build
      # in one cube короче total wall.
      - name: build
        image: node:24-slim
        # Build-time Vite env vars — `import.meta.env.VITE_*` inlined в
        # bundle constants.
        # - `VITE_DEMO_DEPLOYMENT=true` — DemoInboxPanel renders после
        #   «Письмо отправлено» (canon `[[demo_inbox_panel_ci_canon_2026_05_21]]`).
        # - `VITE_YANDEX_CAPTCHA_SITE_KEY` — SmartCaptcha client_key (public,
        #   prefix `ysc1_`). Когда set → captcha widget renders на magic-link
        #   форму. Bootstrap: получить value via `terraform output -raw
        #   smartcaptcha_client_key` после первого `tofu apply` (см.
        #   `infra/bootstrap.md` шаг 1.5). Empty value = captcha widget
        #   не рендерится (backend canon `captcha-gate.ts` пропускает запросы
        #   без validation если SMARTCAPTCHA_SERVER_KEY также unset — symmetric).
        env:
          VITE_DEMO_DEPLOYMENT: 'true'
          # client_key public (prefix ysc1_) — safe для commit. Bootstrap 2026-05-22.
          # Rotation: новый captcha resource → operator updates this value AND
          # обновляет Lockbox sepshn-smartcaptcha-server-key version (см. bootstrap.md).
          VITE_YANDEX_CAPTCHA_SITE_KEY: 'ysc1_JiHqDVfZbBORsLm51BCjrgdM2oYfUHGalDDVQoqeb8dc30f0'
        script:
          - corepack enable && corepack prepare pnpm@10.33.4 --activate
          - pnpm install --frozen-lockfile
          - pnpm --filter @horeca/frontend build

      - name: upload
        needs: [build]
        image:
          name: amazon/aws-cli:2.34.50
          entrypoint: ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.FRONTEND_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.FRONTEND_S3_SECRET_ACCESS_KEY }}
          # SourceCraft inject «AWS_DEFAULT_REGION=ru-central1-» с лишним дефисом
          # (наблюдаем в run #9 log). Explicit override фиксит до фикса SC side.
          AWS_DEFAULT_REGION: ru-central1
          S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        script:
          # Pass 1: hashed assets — immutable, max-age=1 year
          - aws --endpoint-url=https://storage.yandexcloud.net s3 sync
            apps/frontend/dist/ s3://${S3_BUCKET}/
            --exclude "*" --include "assets/*"
            --cache-control "public, max-age=31536000, immutable"
            --delete
          # Pass 2: PWA icons + manifest images — day cache
          - aws --endpoint-url=https://storage.yandexcloud.net s3 sync
            apps/frontend/dist/ s3://${S3_BUCKET}/
            --exclude "*"
            --include "*.png" --include "*.svg" --include "*.ico"
            --cache-control "public, max-age=86400"
          # Pass 3: index.html + service worker + manifest — no-cache
          - aws --endpoint-url=https://storage.yandexcloud.net s3 sync
            apps/frontend/dist/ s3://${S3_BUCKET}/
            --exclude "*"
            --include "index.html"
            --include "sw.js"
            --include "workbox-*.js"
            --include "manifest.webmanifest"
            --include "registerSW.js"
            --cache-control "no-cache, must-revalidate"

  # ---------------------------------------------------------------------------
  # DEPLOY-VERIFY — post-deploy 3-layer gate (stankoff canon, lines 124-288)
  # ---------------------------------------------------------------------------
  - name: deploy-verify
    cubes:
      # Single-dependent task (playwright-smoke only consumer) — install cube
      # НЕ окупается (empirical run #15/#16: 83s overhead > 60s playwright save).
      # Combined в playwright-smoke cube.
      - name: http-smoke
        image: alpine/curl:latest
        script:
          # `curl --retry 5 --retry-delay 2 --retry-all-errors --connect-timeout 10`
          # canon 2026-05-20 для serverless cold-start. curl auto-удваивает delay
          # между попытками (built-in exponential backoff). --retry-all-errors =
          # retry на HTTP 5xx тоже. Заменяет хрупкий `sleep 20` — cold-start под
          # нагрузкой может превысить 20s.
          - 'CURL="curl -sf --retry 5 --retry-delay 2 --retry-all-errors --connect-timeout 10"'
          - '$CURL https://demo.sepshn.ru/health | grep -q ''"status":"ok"'' && echo "ok /health"'
          - '$CURL https://demo.sepshn.ru/health/live | grep -q ''"status":"ok"'' && echo "ok /health/live"'
          - '$CURL https://demo.sepshn.ru/health/ready | grep -q ''"status":"ok"'' && echo "ok /health/ready"'
          - '$CURL https://demo.sepshn.ru/health/db | grep -q ''"status":"ok"'' && echo "ok /health/db"'
          - '$CURL -o /dev/null -w "%{http_code}" https://demo.sepshn.ru/ | grep -q "200" && echo "ok SPA root"'
          - '$CURL -o /dev/null -w "%{http_code}" https://demo.sepshn.ru/booking/fake-id | grep -q "200" && echo "ok SPA fallback"'
          - 'curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 10 https://demo.sepshn.ru/api/v1/properties | grep -q "401" && echo "ok Auth-gated 401"'

      # Playwright image — cr.yandex MIRROR (intra-DC fast pull).
      # Run #21 verified: mirror-playwright workflow successfully copied
      # mcr.microsoft.com/playwright:v1.60.0-noble → cr.yandex/.../playwright:v1.60.0-noble
      # Empirical baseline: prepare-image 200-271s от MCR cross-border RU.
      # Expected: ~30-50s intra-DC pull (1Gbps Yandex DC network).
      # Mirror автоматически обновляется через workflow mirror-images
      # (paths filter: pnpm-lock.yaml | .sourcecraft/ci.yaml changes).
      - name: playwright-smoke
        needs: [http-smoke]
        image: cr.yandex/crp4um8fg84qoro1voi6/playwright:v1.60.0-noble
        env:
          PLAYWRIGHT_BASE_URL: 'https://demo.sepshn.ru'
          PLAYWRIGHT_API_URL: 'https://demo.sepshn.ru'
        script:
          - corepack enable && corepack prepare pnpm@10.33.4 --activate
          - pnpm install --frozen-lockfile
          - pnpm exec playwright test smoke.spec.ts --project smoke --reporter=line
