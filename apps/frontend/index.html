<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<!--
			interactive-widget=resizes-content (M9.1):
			required чтобы на iOS Safari layout сжимался под virtual keyboard,
			иначе svh/dvh units на формы не реагируют (Round 4 self-audit finding).
		-->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
		/>
		<!--
			Hybrid theme-color (M9.1):
			Two static <meta media=> tags обеспечивают FOUC-free initial render
			для system-mode users. ThemeProvider patch'ит дополнительный
			no-media <meta> ниже только при explicit user choice.
		-->
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />
		<meta name="theme-color" content="" />
		<!--
			PWA assets (M9.4):
			apple-touch-icon — для iOS «Open as Web App» (iOS 26 Share menu default ON 2025-09).
			favicon — desktop browser tab.
			Manifest auto-injected via vite-plugin-pwa runtime.
		-->
		<link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" href="/logo.svg" type="image/svg+xml" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<title>Сэпшн — программа для гостевых домов и мини-отелей</title>
		<meta
			name="description"
			content="Программа для управления гостевым домом или мини-отелем. Сделано в Сочи."
		/>
		<!-- Open Graph (для preview в Telegram / WhatsApp / соцсетях) -->
		<meta property="og:title" content="Сэпшн" />
		<meta
			property="og:description"
			content="Программа для управления гостевым домом или мини-отелем. Сделано в Сочи."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://sepshn.ru/" />
		<meta property="og:locale" content="ru_RU" />
		<!-- og:image — fallback на PWA-иконку 512×512. TODO: заменить на dedicated 1200×630 OG image -->
		<meta property="og:image" content="/pwa-512x512.png" />
		<meta property="og:image:width" content="512" />
		<meta property="og:image:height" content="512" />
		<!-- Twitter Card (LinkedIn также читает) -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Сэпшн" />
		<meta
			name="twitter:description"
			content="Программа для управления гостевым домом или мини-отелем. Сделано в Сочи."
		/>
		<meta name="twitter:image" content="/pwa-512x512.png" />
		<!--
			FOUC-prevention script (M9.1):
			Apply'ит .dark класс ПЕРЕД React mount чтобы избежать flash при reload
			на dark-странице. Storage key 'horeca-theme' match'ится с useThemeStore
			(src/lib/theme-store.ts) — НЕ менять без одновременного обновления.
			color-scheme управляется CSS-каскадом (:root + .dark), не JS-style.
		-->
		<script>
			;(() => {
				try {
					const t = localStorage.getItem('horeca-theme')
					const stored = t ? JSON.parse(t).state.theme : 'system'
					const d =
						stored === 'dark' ||
						(stored === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
					if (d) document.documentElement.classList.add('dark')
				} catch {}
			})()
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
