<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<!--
			Content-Security-Policy (Sprint C+ Round 6 2026-05-24 — Security red team P0):
			Closes stored-XSS → account-takeover vector. Без CSP attacker может plant
			XSS payload в org name / property name → exfil DSAR PII через authenticated
			fetch (credentials:include).

			Modern strict CSP — no 'unsafe-inline' for scripts. Inline FOUC script
			extracted к /theme-init.js (script-src 'self' suffices).

			Trusted origins:
			  - Yandex Metrika (mc.yandex.ru/mc.webvisor.com): analytics 109307396
			  - Yandex SmartCaptcha (smartcaptcha.yandexcloud.net): captcha widget
			  - YC Object Storage (storage.yandexcloud.net): direct image fetch
			  - *.sepshn.ru: API + WebSocket для demo realtime

			'unsafe-inline' для style-src обязателен — Tailwind 4 + React 19 inject
			dynamic styles. styles less XSS-impactful (no script execution surface).

			Note: frame-ancestors 'none' ignored в meta-CSP (must be HTTP header).
			Future: move к API Gateway response_overrides когда YC поддержит.
		-->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://mc.yandex.ru https://mc.webvisor.com https://smartcaptcha.yandexcloud.net; script-src-elem 'self' 'wasm-unsafe-eval' https://mc.yandex.ru https://mc.webvisor.com https://smartcaptcha.yandexcloud.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://mc.yandex.ru https://*.yandex.net https://*.storage.yandexcloud.net https://storage.yandexcloud.net; font-src 'self' data:; connect-src 'self' https://*.sepshn.ru wss://*.sepshn.ru https://mc.yandex.ru https://mc.webvisor.com https://yandex.ru https://smartcaptcha.yandexcloud.net https://storage.yandexcloud.net; frame-src https://smartcaptcha.yandexcloud.net; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; upgrade-insecure-requests"
		/>
		<!--
			interactive-widget=resizes-content (M9.1):
			required чтобы на iOS Safari layout сжимался под virtual keyboard,
			иначе svh/dvh units на формы не реагируют (Round 4 self-audit finding).
		-->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
		/>
		<!--
			Hybrid theme-color (M9.1):
			Two static <meta media=> tags обеспечивают FOUC-free initial render
			для system-mode users. ThemeProvider patch'ит дополнительный
			no-media <meta> ниже только при explicit user choice.
		-->
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />
		<meta name="theme-color" content="" />
		<!--
			PWA assets (M9.4):
			apple-touch-icon — для iOS «Open as Web App» (iOS 26 Share menu default ON 2025-09).
			favicon — desktop browser tab.
			Manifest auto-injected via vite-plugin-pwa runtime.
		-->
		<link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" href="/logo.svg" type="image/svg+xml" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<title>Сэпшн — программа для гостевых домов и мини-отелей</title>
		<meta
			name="description"
			content="Программа для управления гостевым домом или мини-отелем. Сделано в Сочи."
		/>
		<!-- Open Graph (для preview в Telegram / WhatsApp / соцсетях) -->
		<meta property="og:title" content="Сэпшн" />
		<meta
			property="og:description"
			content="Программа для управления гостевым домом или мини-отелем. Сделано в Сочи."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://sepshn.ru/" />
		<meta property="og:locale" content="ru_RU" />
		<!-- og:image — fallback на PWA-иконку 512×512. TODO: заменить на dedicated 1200×630 OG image -->
		<meta property="og:image" content="/pwa-512x512.png" />
		<meta property="og:image:width" content="512" />
		<meta property="og:image:height" content="512" />
		<!-- Twitter Card (LinkedIn также читает) -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Сэпшн" />
		<meta
			name="twitter:description"
			content="Программа для управления гостевым домом или мини-отелем. Сделано в Сочи."
		/>
		<meta name="twitter:image" content="/pwa-512x512.png" />
		<!--
			FOUC-prevention script (M9.1):
			Extracted to /theme-init.js (Sprint C+ Round 6 — strict CSP enables
			`script-src 'self'` без inline-hash maintenance overhead). Loaded
			synchronously в <head> чтобы apply '.dark' класс ПЕРЕД React mount.
			Source: /public/theme-init.js
		-->
		<script src="/theme-init.js"></script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
