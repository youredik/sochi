# Git hooks. GitHub CI is temporarily disabled, so these are our only
# automated gates — they MUST catch regressions before push.
#
# pre-commit: fast static checks (no DB), parallel where safe.
# pre-push:   test suite (requires local YDB), runs once per push.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: pnpm biome check --staged --no-errors-on-unmatched {staged_files}

    - name: sherif
      run: pnpm sherif

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: pnpm typecheck

    - name: knip
      glob: "*.{ts,tsx,json}"
      run: pnpm knip

    - name: depcruise
      glob: "*.{ts,tsx}"
      run: pnpm depcruise

# pre-push gates all run in sequence. Any failure blocks the push — this is
# our only safety net while GitHub CI is disabled.
#   tests  — full vitest suite (unit + integration, 258+ against real YDB)
#   build  — prod bundle (frontend vite + shared tsc), catches type-safe
#            regressions that dev-mode tsx silently papers over
#   smoke  — end-to-end HTTP scenario (auth → domain → booking lifecycle →
#            CDC → activity → tourism tax report → cross-tenant adversarial →
#            overbooking race), validates the wired production code path
pre-push:
  jobs:
    - name: tests
      # `test:serial` (vitest run --no-file-parallelism) — backend integration
      # tests share local YDB; parallel file workers occasionally exhaust the
      # docker container's connection pool and flake the gate (different tests
      # fail each run, all passing solo). Serial run = ~90s instead of ~25s but
      # 100% deterministic. `pnpm test` (parallel) stays for fast dev iteration.
      run: pnpm test:serial
    - name: build
      run: pnpm build
    - name: smoke
      run: pnpm smoke
    - name: e2e-smoke
      # Playwright full suite (all .spec.ts files via chromium project).
      # Covers: auth adversarial, wizard flow, reservation grid (keyboard +
      # read), booking create + edit state-machine, cross-tenant probes,
      # and @axe-core/playwright WCAG 2.2 AA gate (grid-a11y.spec.ts —
      # ANY axe violation blocks the push, empirical compliance proof).
      # Full run ~45s with reused dev servers.
      run: pnpm e2e:smoke
