# Pre-commit hooks — fast checks on staged files only.
# Full pipeline (depcruise, knip, typecheck, test) runs in CI.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: pnpm biome check --staged --no-errors-on-unmatched {staged_files}

    - name: sherif
      run: pnpm sherif
