# Git hooks. GitHub CI is temporarily disabled, so these are our only
# automated gates — they MUST catch regressions before push.
#
# pre-commit: fast static checks (no DB), parallel where safe.
# pre-push:   test suite (requires local YDB), runs once per push.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: pnpm biome check --staged --no-errors-on-unmatched {staged_files}

    - name: sherif
      run: pnpm sherif

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: pnpm typecheck

    - name: knip
      glob: "*.{ts,tsx,json}"
      run: pnpm knip

    - name: depcruise
      glob: "*.{ts,tsx}"
      run: pnpm depcruise

# pre-push gates all run in sequence. Any failure blocks the push — this is
# our only safety net while GitHub CI is disabled.
#   tests  — full vitest suite (unit + integration, 258+ against real YDB)
#   build  — prod bundle (frontend vite + shared tsc), catches type-safe
#            regressions that dev-mode tsx silently papers over
#   smoke  — end-to-end HTTP scenario (auth → domain → booking lifecycle →
#            CDC → activity → tourism tax report → cross-tenant adversarial →
#            overbooking race), validates the wired production code path
pre-push:
  jobs:
    - name: tests
      run: pnpm test
    - name: build
      run: pnpm build
    - name: smoke
      run: pnpm smoke
    - name: e2e-smoke
      # Playwright browser smoke — signup, adversarial auth paths (wrong
      # password, anonymous→protected redirect, authed inverse-guard,
      # cross-tenant, consent-required signup, public /privacy), logout.
      # Budget ~15s with reused dev servers. Full 11-assertion run today.
      run: pnpm e2e:smoke
