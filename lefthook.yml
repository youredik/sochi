# Git hooks. Two-tier strategy per 2026 senior research
# (`feedback_pre_push_changed_strategy.md`):
#
# pre-commit: full static gates (cheap, локально, fast feedback)
# pre-push:   minimal blocking — typecheck/lint/depcruise уже сделали в
#             pre-commit; здесь только то, что зависит от full diff к main
#             (vitest related) + port ownership check.
#
# Full test:serial / Playwright / axe / coverage переезжают в async CI
# (.github/workflows/post-push.yml) — self-hosted runner на dev MacBook
# поднимает их после push в фоне. Red notify → `git revert HEAD && git push`.
#
# Mental model 2026 canon (pkgpulse 2026-03-09 + lefthook 2.1.6):
# pre-push НЕ «block bad code from landing publicly» — на solo-main public
# repo blast radius = local main + 5 минут до async CI verdict. Pre-push =
# «catch obviously stupid mistakes before I forget what I just did».
# Hard cap: 30s. Реально сейчас ~15-20s.

pre-commit:
  parallel: true
  jobs:
    - name: gitleaks
      # Secret scanning gate (canon 2026-05-20 research). gitleaks v8.30.1+
      # canonical command per official .pre-commit-hooks.yaml — `git
      # --pre-commit --redact --staged --verbose`. Deprecated `protect`/
      # `detect` подкоманды NOT использовать. Sub-second на staged diff,
      # не съедает pre-commit budget. Защита от accidental key/token
      # commits (например PAT в README).
      run: gitleaks git --pre-commit --redact --staged --verbose

    - name: oxfmt
      glob: '*.{ts,tsx,js,jsx,json,css,md,html,yml,yaml}'
      # Phase 12 (2026-05-12): oxfmt replaces biome formatter — 3× faster,
      # 100% Prettier conformance, ecosystem alignment (Vue/Vercel/Sentry).
      # Mass-format commit in .git-blame-ignore-revs.
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true

    - name: biome-lint
      glob: '*.{ts,tsx,js,jsx,json,css}'
      # Biome retained as LINTER ONLY (formatter swapped to oxfmt).
      # Heavy lift: per-package noRestrictedImports overrides + project-domain
      # rules (noUnresolvedImports, noPrivateImports, noUndeclaredDependencies,
      # noImportCycles, noFloatingPromises, noLeakedRender) — not trivially
      # portable to oxlint.
      run: pnpm biome lint --staged --no-errors-on-unmatched {staged_files}

    - name: sherif
      run: pnpm sherif

    - name: typecheck
      glob: '*.{ts,tsx}'
      # `pnpm typecheck` is now canonical = tsgo parallel (Phase 4 full
      # 2026-05-12). `pnpm typecheck:fallback` = tsc parallel for triage.
      # Microsoft endorsement: TS 7 Beta «ready for CI pipelines today».
      # Audit trail: post-push.yml shadow diff-runner. Revert path: swap
      # `typecheck` value back to `run-p typecheck:tsc:*` in package.json.
      run: pnpm typecheck

    - name: knip
      glob: '*.{ts,tsx,json}'
      run: pnpm knip

    - name: depcruise
      glob: '*.{ts,tsx}'
      run: pnpm depcruise

    - name: decorator-canary
      # Block Lit @customElement classes with `static (get|set)` accessor —
      # crashes tsgo TS 7 per microsoft/typescript-go#3817 + #3801 (OPEN
      # 2026-05-13). See scripts/decorator-canary.sh header for context +
      # removal trigger.
      glob: 'apps/widget-embed/src/**/*.{ts,tsx}'
      run: bash scripts/decorator-canary.sh

    - name: backend-no-import-meta-env
      # Block `import.meta.env` in backend / shared code — Bun #21097
      # (OPEN 2026-05-13) empties it to {} under `bun build --compile`,
      # silently dropping env-dependent branches in the distroless binary.
      # See scripts/backend-no-import-meta-env.sh header for context +
      # removal trigger. Inventory ref: phase_16_closure_done item #6.
      glob: '{apps/backend,packages/shared}/src/**/*.{ts,tsx}'
      run: bash scripts/backend-no-import-meta-env.sh

    - name: check-dev-server-age
      # Advisory pre-flight check (exit 0 always) — warns если frontend dev
      # server (port 5273) potentially stale. Vite HMR does NOT reload on
      # vite.config / new deps / route-tree regen / shared schema changes.
      # Caught 2026-05-17 when vite uptime 2d10h served pre-G3 code through
      # all G3-G11 commits → 5 min phantom debug session.
      # See `[[dev-server-staleness-canon]]` 2026-05-17.
      run: bash scripts/check-dev-server-age.sh

    - name: check-api-base-consistency
      # Round 12 R12V-2 systemic gate — assert frontend `_demo/` api-client
      # BASE constants match backend `_demo/index.ts` mount paths verbatim.
      # Caught 2026-05-26 by Preview MCP UI walk: Round 9 shipped Ostrovok
      # api-client с extra `/api/b2b/v3` suffix → all calls 404 → demo UI
      # completely broken while unit tests greenwashed wrong path. ~50ms
      # static grep check. See script header для canonical rule.
      glob: 'apps/{backend,frontend}/src/**/{index.ts,api-client.ts}'
      run: bash scripts/check-api-base-consistency.sh

# Pre-push: minimal blocking gate (≤5s hard cap).
# Skip via `LEFTHOOK=0 git push` (built-in env override; не --no-verify).
#
# Recurring incident 2026-04-30: попробовал `vitest --changed origin/main`
# — оказалось, что при large divergence (16+ локальных commits) `--changed`
# matches почти весь suite (4317 tests / 4252 total) → 319s wall-clock.
# Vitest issue #8654 + #1113 описывают этот edge case. **DROP vitest из
# pre-push entirely** — ВСЕ tests переезжают в async self-hosted runner.
# Pre-commit уже catches typecheck/lint/depcruise/knip/sherif на каждом
# commit — pre-push гейт = только port ownership pre-flight.
pre-push:
  parallel: true
  jobs:
    - name: dev-doctor
      # Port ownership + /health marker check
      # (`feedback_no_disrupt_other_dev.md`). ~2s. Catches stankoff hijack
      # ДО async CI запуска.
      run: pnpm doctor

    - name: yc-preflight
      # Verify yc CLI active profile + cloud + folder matches sepshn-new.
      # Canon после 2026-05-22 STANKOFF incident: создал SmartCaptcha в
      # cloud b1gg0266sk64qsps35f5 (STANKOFF) вместо b1gisf466novulsg0a0n
      # (SEPSHN) потому что default profile был `portal`. ~0.1s. Если
      # planned push содержит infra/ changes, mismatch profile → CI
      # tofu apply сделает ресурсы в чужом cloud (но это уже после push).
      # Pre-push здесь — local-environment safety для манульных yc cmd.
      run: bash scripts/yc-preflight.sh

    - name: ratchet
      # Ratchet gate — quality only goes UP. Counts depcruise/knip/audit/
      # typecheck/biome-errors/weak-assertions/multi-line-biome-ignore vs
      # `.ratchet/baseline.json`. Any regression → fail.
      # Adapted from stankoff-v2 canonical pattern (`fix(test): vitest 4
      # isolate:false` lineage 2026-05-08; adopted 2026-05-12).
      # ~3s typical (no test runs, just static counts).
      # See `feedback_stankoff_testing_innovations_adoption.md`.
      run: bash scripts/ratchet-check.sh

# Async CI strategy:
# `.github/workflows/post-push.yml` runs full test:serial + Playwright +
# coverage на self-hosted runner (dev MacBook). On red — macOS notification
# через osascript step. Recovery: `git revert HEAD && git push` (safe для
# solo-main, no rebase). Setup-инструкции в самом workflow header.
#
# До setup self-hosted runner — async workflow тихо queues. Pre-commit
# (typecheck+lint+depcruise+knip+sherif) остаётся primary safety net.
# Manual milestone-close: `pnpm test:full` + `pnpm e2e` руками перед push.
