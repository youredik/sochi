# Git hooks. GitHub CI is temporarily disabled, so these are our only
# automated gates — they MUST catch regressions before push.
#
# pre-commit: fast static checks (no DB), parallel where safe.
# pre-push:   test suite (requires local YDB), runs once per push.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: pnpm biome check --staged --no-errors-on-unmatched {staged_files}

    - name: sherif
      run: pnpm sherif

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: pnpm typecheck

    - name: knip
      glob: "*.{ts,tsx,json}"
      run: pnpm knip

    - name: depcruise
      glob: "*.{ts,tsx}"
      run: pnpm depcruise

pre-push:
  jobs:
    - name: tests
      run: pnpm test
