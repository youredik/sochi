# Git hooks. Two-tier strategy per 2026 senior research
# (`feedback_pre_push_changed_strategy.md`):
#
# pre-commit: full static gates (cheap, локально, fast feedback)
# pre-push:   minimal blocking — typecheck/lint/depcruise уже сделали в
#             pre-commit; здесь только то, что зависит от full diff к main
#             (vitest related) + port ownership check.
#
# Full test:serial / Playwright / axe / coverage переезжают в async CI
# (.github/workflows/post-push.yml) — self-hosted runner на dev MacBook
# поднимает их после push в фоне. Red notify → `git revert HEAD && git push`.
#
# Mental model 2026 canon (pkgpulse 2026-03-09 + lefthook 2.1.6):
# pre-push НЕ «block bad code from landing publicly» — на solo-main public
# repo blast radius = local main + 5 минут до async CI verdict. Pre-push =
# «catch obviously stupid mistakes before I forget what I just did».
# Hard cap: 30s. Реально сейчас ~15-20s.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: pnpm biome check --staged --no-errors-on-unmatched {staged_files}

    - name: sherif
      run: pnpm sherif

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: pnpm typecheck

    - name: knip
      glob: "*.{ts,tsx,json}"
      run: pnpm knip

    - name: depcruise
      glob: "*.{ts,tsx}"
      run: pnpm depcruise

# Pre-push: minimal blocking gate (≤5s hard cap).
# Skip via `LEFTHOOK=0 git push` (built-in env override; не --no-verify).
#
# Recurring incident 2026-04-30: попробовал `vitest --changed origin/main`
# — оказалось, что при large divergence (16+ локальных commits) `--changed`
# matches почти весь suite (4317 tests / 4252 total) → 319s wall-clock.
# Vitest issue #8654 + #1113 описывают этот edge case. **DROP vitest из
# pre-push entirely** — ВСЕ tests переезжают в async self-hosted runner.
# Pre-commit уже catches typecheck/lint/depcruise/knip/sherif на каждом
# commit — pre-push гейт = только port ownership pre-flight.
pre-push:
  parallel: true
  jobs:
    - name: dev-doctor
      # Port ownership + /health marker check
      # (`feedback_no_disrupt_other_dev.md`). ~2s. Catches stankoff hijack
      # ДО async CI запуска. **Единственный** pre-push gate — всё остальное
      # уже в pre-commit (быстро, на каждый commit).
      run: pnpm doctor

# Async CI strategy:
# `.github/workflows/post-push.yml` runs full test:serial + Playwright +
# coverage на self-hosted runner (dev MacBook). On red — macOS notification
# через osascript step. Recovery: `git revert HEAD && git push` (safe для
# solo-main, no rebase). Setup-инструкции в самом workflow header.
#
# До setup self-hosted runner — async workflow тихо queues. Pre-commit
# (typecheck+lint+depcruise+knip+sherif) остаётся primary safety net.
# Manual milestone-close: `pnpm test:full` + `pnpm e2e` руками перед push.
